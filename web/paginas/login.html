<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — TrashFlow</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="Panel de administración de TrashFlow para el monitoreo inteligente de residuos en Vicente López.">
  
  <!-- CSS Imports -->
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="icon" type="image/png" href="../assets/isotipo.png">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card-container">
      
      <!-- Glassmorphic login card -->
      <div class="card login-card">
        <div class="login-header">
          <div class="logo-container">
            <img src="../assets/isologo.png" class="login-logo" alt="TrashFlow Logo">
          </div>
          
          <h1 class="login-title">Monitoreo Urbano Inteligente</h1>
          <p class="login-subtitle">Municipalidad de Vicente López — Panel de Control</p>
        </div>

        <form id="login-form">
          <!-- Inline Error Alert (hidden by default) -->
          <div id="login-error" class="error-banner hidden"></div>

          <div class="form-group">
            <label for="email" class="form-label">Correo Electrónico</label>
            <div class="input-container">
              <input 
                type="email" 
                id="email" 
                class="form-input" 
                placeholder="nombre@municipalidad.gov.ar" 
                required 
                autocomplete="email"
              >
            </div>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Contraseña</label>
            <div class="input-container">
              <input 
                type="password" 
                id="password" 
                class="form-input" 
                placeholder="••••••••" 
                required
                autocomplete="current-password"
              >
              <button type="button" id="toggle-password" class="toggle-password" aria-label="Mostrar contraseña">
                <!-- Eye slash icon (default) -->
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-actions">
            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
          </div>

          <button type="submit" class="btn btn-primary w-full login-btn">
            Iniciar Sesión <span class="arrow">→</span>
          </button>
        </form>

      </div>
    </div>
  </div>

  <!-- Script Imports -->
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
