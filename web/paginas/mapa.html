<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Interactivo — TrashFlow</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="Visualización geoespacial en tiempo real de las alertas de residuos por IA en Vicente López.">
  
  <!-- CSS Leaflet & MarkerCluster CDNs -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css">

  <link rel="icon" type="image/png" href="../assets/isotipo.png">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/mapa.css">
</head>
<body>
  <div class="app-container">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" class="logo-link">
          <img src="../assets/isologo.png" class="sidebar-logo-full" alt="TrashFlow Logo">
          <img src="../assets/isotipo.png" class="sidebar-logo-icon" alt="TrashFlow Icon">
        </a>
      </div>
      
      <nav class="sidebar-content">
        <a href="dashboard.html" class="sidebar-nav-link">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="9"></rect>
            <rect x="14" y="3" width="7" height="5"></rect>
            <rect x="14" y="12" width="7" height="9"></rect>
            <rect x="3" y="16" width="7" height="5"></rect>
          </svg>
          <span class="nav-text">Panel Principal</span>
        </a>
        <a href="alertas.html" class="sidebar-nav-link">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span class="nav-text">Alertas</span>
        </a>
        <a href="mapa.html" class="sidebar-nav-link active">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
            <line x1="8" y1="2" x2="8" y2="18"></line>
            <line x1="16" y1="6" x2="16" y2="22"></line>
          </svg>
          <span class="nav-text">Mapa Interactivo</span>
        </a>
        <a href="camaras.html" class="sidebar-nav-link">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
          <span class="nav-text">Cámaras</span>
        </a>
        <a href="operadores.html" class="sidebar-nav-link">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          <span class="nav-text">Operadores</span>
        </a>
        <a href="reportes.html" class="sidebar-nav-link">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"></line>
            <line x1="12" y1="20" x2="12" y2="4"></line>
            <line x1="6" y1="20" x2="6" y2="14"></line>
          </svg>
          <span class="nav-text">Reportes</span>
        </a>
        <a href="historial.html" class="sidebar-nav-link">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          <span class="nav-text">Historial</span>
        </a>
        <a href="configuracion.html" class="sidebar-nav-link">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          <span class="nav-text">Configuración</span>
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <a href="#" class="logout-btn" id="logout-btn" title="Cerrar Sesión">
          <svg viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          <span>Cerrar Sesión</span>
        </a>
      </div>
    </aside>
    
    <!-- Main Content Container -->
    <main class="main-content">
      
      <!-- Topbar Header -->
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="topbar-title">Mapa Interactivo</h1>
          <div class="topbar-subtitle">
            <span>📍 Monitoreo de Residuos en Vicente López</span>
          </div>
        </div>
      </header>
      
      <!-- Map Area and Floating Filters -->
      <div class="map-view-container">
        <!-- Leaflet Map Container -->
        <div id="map"></div>
        
        <!-- Floating Filter Panel -->
        <div class="filters-panel" id="filters-panel">
          <div class="filters-header">
            <h3>Filtros de Alertas</h3>
            <button class="toggle-filters-btn" id="toggle-filters-btn" title="Colapsar panel">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>
          </div>
          
          <div class="filters-body">
            <div class="filter-group">
              <label class="filter-group-title">Estados</label>
              <div class="checkbox-list">
                <label class="checkbox-item">
                  <input type="checkbox" value="pendiente" checked class="filter-status">
                  <span class="checkbox-custom"></span>
                  <span class="checkbox-label">Pendiente</span>
                </label>
                <label class="checkbox-item">
                  <input type="checkbox" value="asignada" checked class="filter-status">
                  <span class="checkbox-custom"></span>
                  <span class="checkbox-label">Asignada</span>
                </label>
                <label class="checkbox-item">
                  <input type="checkbox" value="en_proceso" checked class="filter-status">
                  <span class="checkbox-custom"></span>
                  <span class="checkbox-label">En Proceso</span>
                </label>
                <label class="checkbox-item">
                  <input type="checkbox" value="resuelta" class="filter-status">
                  <span class="checkbox-custom"></span>
                  <span class="checkbox-label">Resuelta</span>
                </label>
              </div>
            </div>
            
            <div class="filter-group">
              <label for="filter-zona" class="filter-group-title">Zona</label>
              <select id="filter-zona" class="form-select">
                <option value="todas">Todas las Zonas</option>
                <option value="1">Zona 1 - Munro</option>
                <option value="2">Zona 2 - Carapachay</option>
                <option value="3">Zona 3 - Florida Oeste</option>
                <option value="4">Zona 4 - Villa Martelli</option>
                <option value="5">Zona 5 - Florida</option>
                <option value="6">Zona 6 - Olivos</option>
                <option value="7">Zona 7 - Vicente López</option>
              </select>
            </div>
          </div>
          
          <div class="filters-footer">
            <span class="counter-text" id="visible-counter">0 alertas visibles</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Leaflet & MarkerCluster Script CDNs -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

  <!-- Script Core Imports -->
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/mapa.js"></script>
</body>
</html>
