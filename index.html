<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Hosting Funciona 🚀</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #0f172a, #1e293b, #2563eb);
            overflow:hidden;
        }

        .card{
            width:90%;
            max-width:700px;
            padding:50px;
            border-radius:25px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border:1px solid rgba(255,255,255,0.15);
            text-align:center;
            color:white;
            box-shadow:0 20px 50px rgba(0,0,0,0.4);
            animation: aparecer 1s ease;
        }

        h1{
            font-size:3rem;
            margin-bottom:20px;
        }

        p{
            font-size:1.2rem;
            color:#dbeafe;
            margin-bottom:30px;
        }

        .estado{
            display:inline-block;
            padding:15px 30px;
            background:#22c55e;
            color:white;
            border-radius:50px;
            font-weight:bold;
            font-size:1.1rem;
            box-shadow:0 0 20px rgba(34,197,94,0.6);
            animation: pulse 2s infinite;
        }

        .circulo{
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,0.08);
            animation: flotar 10s linear infinite;
        }

        .c1{
            width:250px;
            height:250px;
            top:-50px;
            left:-50px;
        }

        .c2{
            width:180px;
            height:180px;
            bottom:-40px;
            right:-40px;
            animation-duration:14s;
        }

        @keyframes pulse{
            0%{ transform:scale(1); }
            50%{ transform:scale(1.05); }
            100%{ transform:scale(1); }
        }

        @keyframes aparecer{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @keyframes flotar{
            0%{
                transform:translateY(0px) rotate(0deg);
            }
            50%{
                transform:translateY(-20px) rotate(180deg);
            }
            100%{
                transform:translateY(0px) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="circulo c1"></div>
    <div class="circulo c2"></div>

    <div class="card">
        <h1>🚀 Hosting Conectado</h1>

        <p>
            Si estás viendo esta página, tu dominio y hosting funcionan correctamente.
        </p>

        <div class="estado">
            ✅ Sitio Online
        </div>
    </div>

</body>
</html>
